# Lightweight verifier: every push to any branch gets a `go vet` +
# `go build` pass. Exists so downstream pulls always know whether the
# branch tip compiles before they sync.
name: verify

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.2'
          cache: true
          cache-dependency-path: go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
