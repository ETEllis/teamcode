# Verifier: runs `go vet` + `go build` on every push to any branch,
# then mirrors the raw output to a force-pushed `ci-output/<branch>`
# ref so anything (CLI, sandbox, automation) can read the result via
# plain git fetch — no GitHub API needed.
name: verify

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.2'
          cache: true
          cache-dependency-path: go.sum

      - name: capture go vet + go build output
        id: capture
        run: |
          set +e
          mkdir -p _ci_out
          {
            echo "=== go env ==="
            go env GOVERSION GOMOD GOPATH
            echo
            echo "=== go mod download ==="
            go mod download
            echo "mod-download exit: $?"
            echo
            echo "=== go vet ./... ==="
            go vet ./... 2>&1
            VET_EXIT=$?
            echo "vet exit: $VET_EXIT"
            echo
            echo "=== go build ./... ==="
            go build ./... 2>&1
            BUILD_EXIT=$?
            echo "build exit: $BUILD_EXIT"
            echo "FINAL: vet=$VET_EXIT build=$BUILD_EXIT"
          } > _ci_out/log.txt 2>&1
          # Re-parse the exits from the log so they're not lost in the subshell
          VET_EXIT=$(grep -oE "^vet exit: [0-9]+" _ci_out/log.txt | awk '{print $3}')
          BUILD_EXIT=$(grep -oE "^build exit: [0-9]+" _ci_out/log.txt | awk '{print $3}')
          echo "VET_EXIT=${VET_EXIT:-99}"     >> $GITHUB_OUTPUT
          echo "BUILD_EXIT=${BUILD_EXIT:-99}" >> $GITHUB_OUTPUT
          tail -400 _ci_out/log.txt >> $GITHUB_STEP_SUMMARY
          exit 0

      - name: mirror output to ci-output branch
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          SAFE=$(echo "$REF_NAME" | tr '/' '-')
          OUT_BRANCH="ci-output/$SAFE"
          MIRROR_DIR=$(mktemp -d)
          # COPY first so the file exists; cp may fail if the build step never ran.
          if [ -f "$GITHUB_WORKSPACE/_ci_out/log.txt" ]; then
            cp "$GITHUB_WORKSPACE/_ci_out/log.txt" "$MIRROR_DIR/log.txt"
          else
            echo "build step did not produce a log" > "$MIRROR_DIR/log.txt"
          fi
          {
            echo "source_sha: $SHA"
            echo "source_branch: $REF_NAME"
            echo "run_id: $RUN_ID"
            echo "run_attempt: $RUN_ATTEMPT"
            echo "completed_at: $(date -Iseconds)"
          } > "$MIRROR_DIR/meta.txt"
          cd "$MIRROR_DIR"
          git init -q -b "$OUT_BRANCH"
          # config goes INSIDE the new repo
          git config user.email "verify-bot@agency.dev"
          git config user.name  "verify-bot"
          git add log.txt meta.txt
          git commit -q -m "verify output for $SHA on $REF_NAME"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git push -f origin "HEAD:refs/heads/$OUT_BRANCH"

      - name: fail if vet or build failed
        if: steps.capture.outputs.VET_EXIT != '0' || steps.capture.outputs.BUILD_EXIT != '0'
        run: |
          echo "verify failed: vet=${{ steps.capture.outputs.VET_EXIT }} build=${{ steps.capture.outputs.BUILD_EXIT }}"
          exit 1
